server:
  port: 8081

spring:
  application:
    name: identity-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:55432/identity_db}
    username: ${SPRING_DATASOURCE_USERNAME:platform}
    password: ${SPRING_DATASOURCE_PASSWORD:platform}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: identity-service
      auto-offset-reset: earliest

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: Identity Service
    description: Owns users, roles, and authentication concerns

app:
  security:
    jwt:
      issuer: ${APP_JWT_ISSUER:identity-service}
      secret: ${APP_JWT_SECRET:change-me-phase-2-shared-jwt-secret-1234567890}
      access-token-ttl: ${APP_JWT_ACCESS_TOKEN_TTL:PT4H}
  bootstrap-admin:
    enabled: ${APP_BOOTSTRAP_ADMIN_ENABLED:true}
    email: ${APP_BOOTSTRAP_ADMIN_EMAIL:admin@eventdriven.local}
    password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:Admin123!}
