server:
  port: 8083

spring:
  application:
    name: order-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:55432/order_db}
    username: ${SPRING_DATASOURCE_USERNAME:platform}
    password: ${SPRING_DATASOURCE_PASSWORD:platform}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: order-service
      auto-offset-reset: earliest

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: Order Service
    description: Owns order persistence, state transitions, and order outbox records

app:
  clients:
    catalog:
      base-url: ${CATALOG_SERVICE_URL:http://localhost:8082}
  outbox:
    publisher:
      enabled: ${APP_OUTBOX_PUBLISHER_ENABLED:true}
      batch-size: ${APP_OUTBOX_PUBLISHER_BATCH_SIZE:50}
      fixed-delay: ${APP_OUTBOX_PUBLISHER_FIXED_DELAY:5000}
      send-timeout: ${APP_OUTBOX_PUBLISHER_SEND_TIMEOUT:PT5S}
  security:
    jwt:
      issuer: ${APP_SECURITY_JWT_ISSUER:identity-service}
      secret: ${APP_SECURITY_JWT_SECRET:change-me-phase-2-shared-jwt-secret-1234567890}
